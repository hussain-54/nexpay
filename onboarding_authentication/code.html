<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#004c40",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0f2320",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4">
<div class="max-w-md w-full bg-white dark:bg-slate-900 rounded-xl shadow-xl overflow-hidden border border-primary/10">
<div class="p-6">
<div class="flex items-center justify-between mb-8">
<div class="text-primary flex items-center gap-2">
<span class="material-symbols-outlined text-3xl">account_balance_wallet</span>
<span class="text-xl font-bold tracking-tight">NexPay</span>
</div>
<div class="text-slate-400">
<span class="material-symbols-outlined">help_outline</span>
</div>
</div>
<div class="mb-8">
<div class="w-full aspect-video rounded-lg bg-primary/5 flex items-center justify-center mb-6 overflow-hidden">
<div class="w-full h-full bg-gradient-to-br from-primary/20 to-primary/5 flex items-center justify-center relative" data-alt="Abstract green digital finance pattern representing stability">
<span class="material-symbols-outlined text-6xl text-primary/40">security</span>
<div class="absolute bottom-4 left-4 right-4 bg-white/80 backdrop-blur p-3 rounded-lg flex items-center gap-3">
<div class="bg-primary/20 p-2 rounded-full">
<span class="material-symbols-outlined text-primary text-sm">verified_user</span>
</div>
<span class="text-xs font-medium text-slate-800">Secure AES-256 Encryption Enabled</span>
</div>
</div>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-tight mb-2">Welcome to NexPay</h2>
<p class="text-slate-600 dark:text-slate-400 text-sm leading-relaxed">The stablecoin-powered global payment network. Send money across 150+ countries instantly.</p>
</div>
<div class="space-y-4 mt-8" id="wallet-connection">
<button id="connect-wallet-btn" class="w-full bg-[#ab9ff2] hover:bg-[#9a8ee0] text-[#2c2d33] font-bold py-4 rounded-xl shadow-lg shadow-[#ab9ff2]/20 transition-all flex items-center justify-center gap-3">
    <img src="https://phantom.app/img/phantom-logo.svg" alt="Phantom" class="w-6 h-6"/>
    Connect Phantom Wallet
</button>
<p id="wallet-error" class="text-red-500 text-xs text-center hidden">Failed to connect wallet.</p>
</div>
</div>
<div class="p-6 bg-slate-50 dark:bg-slate-800/50 border-t border-slate-100 dark:border-slate-800 flex justify-center gap-4">
<div class="flex flex-col items-center gap-1 opacity-50">
<span class="material-symbols-outlined text-xl">payments</span>
<span class="text-[10px] uppercase tracking-widest font-bold">0.1% Fee</span>
</div>
<div class="flex flex-col items-center gap-1 opacity-50">
<span class="material-symbols-outlined text-xl">speed</span>
<span class="text-[10px] uppercase tracking-widest font-bold">&lt; 1s</span>
</div>
<div class="flex flex-col items-center gap-1 opacity-50">
<span class="material-symbols-outlined text-xl">public</span>
<span class="text-[10px] uppercase tracking-widest font-bold">Global</span>
</div>
</div>
</div>
<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
<script src="https://unpkg.com/@solana/spl-token@latest/lib/index.iife.min.js"></script>
<script src="../solana-backend.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const connectBtn = document.getElementById('connect-wallet-btn');
        const errorMsg = document.getElementById('wallet-error');

        // Check if already connected
        if (window.solanaBackend && window.solanaBackend.getConnectedWallet()) {
            window.location.href = '../wallet_dashboard/code.html';
        }

        if (connectBtn) {
            connectBtn.addEventListener('click', async () => {
                try {
                    errorMsg.classList.add('hidden');
                    connectBtn.innerHTML = '<span class="material-symbols-outlined animate-spin" style="animation: spin 1s linear infinite;">sync</span> Connecting...';
                    await window.solanaBackend.connectWallet();
                    window.location.href = '../wallet_dashboard/code.html';
                } catch (err) {
                    connectBtn.innerHTML = '<img src="https://phantom.app/img/phantom-logo.svg" alt="Phantom" class="w-6 h-6"/> Connect Phantom Wallet';
                    errorMsg.classList.remove('hidden');
                    errorMsg.textContent = err.message || 'Failed to connect wallet.';
                }
            });
        }
    });
</script>
</body></html>
